# ============================================
# Rural Tourism Backend - CD Deploy
# ============================================
# Deploy to production server via SSH
# Triggered after CD Build succeeds on main branch

name: CD Deploy

on:
  workflow_run:
    workflows: ["CD Build"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    environment: production

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          envs: GHCR_TOKEN,GITHUB_ACTOR
          script: |
            cd ~/st_rural_tourism

            # Login to GHCR
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

            # Pull latest backend image
            docker compose pull backend

            # Run database migrations
            echo "Running database migrations..."
            docker compose run --rm backend npx sequelize-cli db:migrate

            # Restart backend with new changes
            docker compose up -d backend

            # Clean up old images
            docker image prune -f

            # Verify health
            sleep 10
            docker compose ps

            # Show migration status
            echo "Current migration status:"
            docker compose exec -T backend npx sequelize-cli db:migrate:status
